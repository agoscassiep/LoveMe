<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#FAF8F5">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="apple-touch-icon.png">
<title>LoveMe</title>
<link href="https://fonts.googleapis.com/css2?family=Shrikhand&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
:root {
  --peach:#F5C8A1;--peach-light:#FBE4CC;--peach-dark:#D9A36E;
  --sage:#A8C5A0;--sage-light:#D0E4CB;--sage-dark:#6E9B63;
  --mustard:#E0A832;--mustard-light:#F2D88A;--mustard-dark:#B8861A;
  --lavender:#C5B8D9;--lavender-light:#E4DCEF;--lavender-dark:#8E78AB;
  --sky:#B5D6E0;--sky-light:#DAF0F5;--sky-dark:#6FAABB;
  --clay:#C97B5A;--clay-light:#E4B8A0;--clay-dark:#8E5238;
  --neutral-50:#FAF8F5;--neutral-100:#F2EDE6;--neutral-200:#E5DDD3;--neutral-300:#C9BFB2;
  --neutral-400:#A69D91;--neutral-500:#7D7568;--neutral-600:#5A5347;--neutral-700:#3D3830;--neutral-800:#2A2520;--neutral-900:#1A1714;
  --success:#6E9B63;--warning:#E0A832;--error:#D16B5A;--info:#6FAABB;
  --font-display:'Shrikhand',cursive;
  --font-body:'DM Sans',-apple-system,sans-serif;
  --radius-sm:8px;--radius-md:12px;--radius-lg:16px;--radius-xl:20px;--radius-2xl:24px;--radius-3xl:32px;--radius-full:9999px;
  --shadow-xs:0 1px 2px rgba(26,23,20,0.04);--shadow-sm:0 2px 8px rgba(26,23,20,0.06);--shadow-md:0 4px 16px rgba(26,23,20,0.08);--shadow-lg:0 8px 32px rgba(26,23,20,0.10);
  --ease-out:cubic-bezier(0.16,1,0.3,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px;scroll-behavior:smooth}
body{
  font-family:var(--font-body);background:var(--neutral-50);color:var(--neutral-800);
  font-size:14px;line-height:20px;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;
  min-height:100vh;min-height:100dvh;
}
#app{max-width:430px;margin:0 auto;min-height:100vh;min-height:100dvh;padding-bottom:80px;position:relative}

/* Header */
.header{
  padding:14px 20px 10px;text-align:center;
  background:rgba(250,248,245,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  position:sticky;top:0;z-index:50;
  border-bottom:1px solid var(--neutral-200);
}
.header h1{font-family:var(--font-display);font-size:22px;color:var(--neutral-800);letter-spacing:-0.02em}
.header-sub{font-size:11px;color:var(--neutral-400);margin-top:1px;font-weight:500;letter-spacing:0.05em;text-transform:uppercase}

/* Bottom nav */
.bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);max-width:430px;width:100%;
  display:flex;justify-content:space-around;align-items:center;
  padding:10px 16px;padding-bottom:max(10px,env(safe-area-inset-bottom));z-index:100;
  background:white;border-radius:var(--radius-2xl) var(--radius-2xl) 0 0;
  box-shadow:0 -4px 24px rgba(26,23,20,0.08);
}
.nav-item{
  display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;
  color:var(--neutral-400);font-size:10px;font-weight:500;cursor:pointer;padding:4px 10px;
  transition:color 0.15s var(--ease-out);font-family:var(--font-body);border-radius:var(--radius-lg);
}
.nav-item.active{color:var(--neutral-800);background:var(--neutral-100)}
.nav-icon{font-size:20px;line-height:1}
.nav-fab{
  width:76px;height:76px;background:none;border:none;
  margin-top:-32px;cursor:pointer;position:relative;
  transition:all 0.15s var(--ease-out);
}
.nav-fab:active{transform:scale(0.93)}

/* Drawer */
.drawer-overlay{position:fixed;inset:0;background:rgba(26,23,20,0.4);z-index:200;opacity:0;transition:opacity 0.25s;pointer-events:none}
.drawer-overlay.open{opacity:1;pointer-events:auto}
.drawer{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);
  max-width:430px;width:100%;background:white;border-radius:var(--radius-3xl) var(--radius-3xl) 0 0;
  padding:20px 20px;padding-bottom:max(20px,env(safe-area-inset-bottom));z-index:201;
  transition:transform 0.35s var(--ease-out);box-shadow:0 -8px 40px rgba(26,23,20,0.15);
  max-height:85vh;overflow-y:auto;
}
.drawer-overlay.open .drawer{transform:translateX(-50%) translateY(0)}
.drawer-handle{width:36px;height:4px;border-radius:9999px;background:var(--neutral-200);margin:0 auto 16px}

/* Congrats overlay */
.congrats-overlay{
  position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;
  background:rgba(250,248,245,0.97);opacity:0;pointer-events:none;transition:opacity 0.3s;
}
.congrats-overlay.show{opacity:1;pointer-events:auto}
.congrats-box{text-align:center;padding:32px 24px;max-width:320px;animation:congPop 0.4s var(--ease-out);position:relative;z-index:301}
@keyframes congPop{from{opacity:0;transform:scale(0.85) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}

/* Shape rain */
.shape-rain{position:fixed;inset:0;z-index:299;pointer-events:none;overflow:hidden}
.shape-rain svg{position:absolute;animation:shapeFall linear forwards;opacity:0.6}
@keyframes shapeFall{0%{transform:translateY(-60px) rotate(0deg);opacity:0}10%{opacity:0.5}90%{opacity:0.4}100%{transform:translateY(110vh) rotate(360deg);opacity:0}}

/* Page */
.page{padding:16px 16px 20px;animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Card */
.card{
  background:white;border-radius:var(--radius-lg);padding:16px;margin-bottom:12px;
  box-shadow:var(--shadow-sm);transition:all 0.25s var(--ease-out);
}
.card-colored{box-shadow:none}
.card-title{font-family:var(--font-body);font-weight:700;font-size:14px;color:var(--neutral-800);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.card-icon-box{width:36px;height:36px;border-radius:var(--radius-md);background:rgba(0,0,0,0.05);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}

/* Score ring (mini) */
.score-ring svg{transform:rotate(-90deg)}

/* Streak badge */
.streak-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 16px;border-radius:var(--radius-full);font-size:13px;font-weight:600;
}

/* Stats row */
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-box{background:white;border-radius:var(--radius-lg);padding:16px;text-align:center;box-shadow:var(--shadow-sm)}
.stat-value{font-family:var(--font-display);font-size:22px;color:var(--neutral-800)}
.stat-label{font-size:10px;color:var(--neutral-400);text-transform:uppercase;letter-spacing:0.05em;margin-top:2px;font-weight:600}

/* Check items */
.check-item{
  display:flex;align-items:center;gap:12px;padding:12px 14px;
  background:var(--neutral-50);border:1.5px solid var(--neutral-200);
  border-radius:var(--radius-xl);margin-bottom:8px;cursor:pointer;
  transition:all 0.15s var(--ease-out);user-select:none;-webkit-user-select:none;
}
.check-item.checked{background:var(--sage-light);border-color:var(--sage)}
.check-box{
  width:24px;height:24px;border-radius:var(--radius-sm);border:2px solid var(--neutral-300);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;font-weight:700;
  transition:all 0.15s var(--ease-out);color:white;
}
.check-item.checked .check-box{background:var(--sage-dark);border-color:var(--sage-dark)}
.check-label{font-size:14px;flex:1;font-weight:500;color:var(--neutral-700)}
.check-item.checked .check-label{color:var(--neutral-500);text-decoration:line-through;text-decoration-color:var(--neutral-300)}

/* Inputs */
.input-field{
  background:white;border:1.5px solid var(--neutral-200);border-radius:var(--radius-full);
  padding:10px 16px;color:var(--neutral-800);font-size:14px;font-family:var(--font-body);
  width:100%;outline:none;transition:all 0.15s var(--ease-out);
}
.input-field:focus{border-color:var(--sage);box-shadow:0 0 0 3px rgba(168,197,160,0.3)}
.input-field::placeholder{color:var(--neutral-400)}

/* Buttons */
.btn{
  background:var(--mustard);color:var(--neutral-800);border:none;border-radius:var(--radius-full);
  padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font-body);
  transition:all 0.15s var(--ease-out);box-shadow:var(--shadow-sm);
}
.btn:active{transform:scale(0.97)}
.btn-sm{padding:6px 14px;font-size:12px}
.btn-sage{background:var(--sage);color:white}
.btn-ghost{background:transparent;border:1.5px solid var(--neutral-300);color:var(--neutral-600);box-shadow:none}

/* Meal cards */
.meal-card{background:white;border-radius:var(--radius-lg);padding:16px;margin-bottom:10px;box-shadow:var(--shadow-xs)}
.meal-title{font-weight:700;font-size:13px;color:var(--neutral-700);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.meal-desc{font-size:14px;color:var(--neutral-800);line-height:20px}
.meal-time{font-size:10px;color:var(--neutral-400);margin-left:auto;font-weight:500}

/* Day tabs */
.day-tabs{display:flex;gap:4px}
.day-tab{
  flex:1;min-width:0;padding:6px 4px;border-radius:var(--radius-full);text-align:center;
  border:1.5px solid var(--neutral-200);background:white;color:var(--neutral-500);
  font-size:12px;cursor:pointer;transition:all 0.15s var(--ease-out);font-family:var(--font-body);font-weight:500;
}
.day-tab.active{background:var(--neutral-800);color:white;border-color:var(--neutral-800)}

/* Section header */
.section-header{font-weight:700;font-size:15px;color:var(--neutral-700);padding:12px 0 6px;border-bottom:1px solid var(--neutral-200);margin-bottom:8px;display:flex;align-items:center;gap:8px}

/* Semaforo */
.semaforo{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;flex-shrink:0}
.semaforo-verde{background:var(--success);box-shadow:0 0 6px rgba(110,155,99,0.4)}
.semaforo-amarillo{background:var(--warning);box-shadow:0 0 6px rgba(224,168,50,0.4)}
.semaforo-rojo{background:var(--error);box-shadow:0 0 6px rgba(209,107,90,0.4)}

/* Resto cards */
.resto-card{background:white;border-radius:var(--radius-lg);padding:16px;margin-bottom:10px;box-shadow:var(--shadow-sm)}
.resto-name{font-weight:700;font-size:14px;color:var(--neutral-800)}
.resto-desc{font-size:12px;color:var(--neutral-500);line-height:1.5;margin-top:4px}
.resto-macros{font-size:11px;color:var(--neutral-500);margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}
.macro-pill{background:var(--neutral-100);padding:2px 8px;border-radius:var(--radius-full);font-size:10px;font-weight:500}

/* Chart */
.chart-container{background:var(--neutral-100);border-radius:var(--radius-xl);padding:16px 8px;margin-top:12px;overflow-x:auto}

/* Progress bar */
.progress-track{height:8px;border-radius:var(--radius-full);background:var(--neutral-100);overflow:hidden}
.progress-fill{height:100%;border-radius:var(--radius-full);transition:width 0.4s var(--ease-out)}

/* Delete btn */
.delete-btn{background:none;border:none;color:var(--neutral-400);cursor:pointer;font-size:14px;padding:2px 6px;opacity:0.5}

/* Exercise detail animation */
.ej-img{width:100%;border-radius:var(--radius-2xl);overflow:hidden;margin-bottom:16px}
.ej-img img{width:100%;display:block;border-radius:var(--radius-2xl)}

/* Ornament (decorative shapes) */
.ornament{text-align:center;padding:8px 0;opacity:0.3}
.ornament svg{transition:transform 0.25s var(--ease-out)}

/* Overlay */
.overlay{position:fixed;inset:0;background:rgba(250,248,245,0.97);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.overlay-box{background:white;border-radius:var(--radius-3xl);padding:32px 24px;max-width:340px;width:100%;text-align:center;box-shadow:var(--shadow-lg)}
.overlay-box h2{font-family:var(--font-display);color:var(--neutral-800);font-size:28px;margin-bottom:6px}
.overlay-box p{color:var(--neutral-500);font-size:13px;margin-bottom:20px;line-height:1.5}

.hidden{display:none}
</style>
</head>
<body>

<div id="app">
  <div class="header" id="app-header" style="position:relative"></div>

</div>

</div>

function exportData(){
  var data={weights:state.weights,shopping:state.shopping,streak:state.streak};
  var checks={};
  try{if(_hasLS){for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k.startsWith('loveme_checks_'))checks[k.replace('loveme_','')]=JSON.parse(localStorage.getItem(k))}}}catch(e){}
  data.checks=checks;data.exportDate=new Date().toISOString();
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='loveme-backup-'+todayStr()+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}
function importData(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=function(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=function(ev){
      try{
        const data=JSON.parse(ev.target.result);
        if(data.weights)state.weights=data.weights;
        if(data.shopping)state.shopping=data.shopping;
        if(data.streak)state.streak=data.streak;
        if(data.checks){Object.entries(data.checks).forEach(function(entry){S.set(entry[0],entry[1])})}
        state.checks=S.get('checks_'+todayStr(),{});
        save();render();
        showToast('Datos restaurados');
      }catch(err){showToast('Error al leer el archivo')}
    };reader.readAsText(file);
  };inp.click();
}
function showToast(msg){
  const t=h('div',{style:{position:'fixed',bottom:'100px',left:'50%',transform:'translateX(-50)',padding:'10px 20px',borderRadius:'var(--radius-full)',background:'var(--neutral-800)',color:'white',fontSize:'14px',fontWeight:'500',zIndex:'999',boxShadow:'var(--shadow-md)',fontFamily:'var(--font-body)',opacity:'0',transition:'opacity 0.3s'}},msg);
  document.body.appendChild(t);requestAnimationFrame(function(){t.style.opacity='1'});
  setTimeout(function(){t.style.opacity='0';setTimeout(function(){document.body.removeChild(t)},300)},2200);
}

function calcStreak(){
  let count=0;const d=new Date();
  for(let i=1;i<=365;i++){const dd=new Date(d);dd.setDate(dd.getDate()-i);const ds=`${dd.getFullYear()}-${String(dd.getMonth()+1).padStart(2,'0')}-${String(dd.getDate()).padStart(2,'0')}`;const checks=S.get('checks_'+ds,{});const sc=HABITS.reduce((s,h)=>s+(checks[h.key]?1:0),0);if(sc>=5)count++;else break}
  if(getScore()>=5)count++;
  state.streak=count;
}
function getStreakInfo(streak){
  if(streak===0)return{icon:'⬜',label:'Sin racha',bg:'var(--neutral-100)',color:'var(--neutral-500)'};
  if(streak<=2)return{icon:'✨',label:'Primer paso',bg:'var(--lavender-light)',color:'var(--lavender-dark)'};
  if(streak<=6)return{icon:'⚡',label:'Arrancando',bg:'var(--sky-light)',color:'var(--sky-dark)'};
  if(streak<=13)return{icon:'🔥',label:'Semana completa',bg:'var(--peach-light)',color:'var(--clay-dark)'};
  if(streak<=20)return{icon:'🔥🔥',label:'En racha',bg:'var(--mustard-light)',color:'var(--mustard-dark)'};
  return{icon:'🔥🔥🔥',label:'Imparable',bg:'var(--sage-light)',color:'var(--sage-dark)'};
}
function getScore(){return HABITS.reduce((s,h)=>s+(state.checks[h.key]?1:0),0)}

// ─── DOM HELPER ───
function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='className')el.className=v;
    else if(k==='innerHTML')el.innerHTML=v;
    else el.setAttribute(k,v);
  });
  children.flat().forEach(c=>{if(c==null||c===false||c===true)return;if(typeof c==='string'||typeof c==='number')el.appendChild(document.createTextNode(String(c)));else if(c instanceof Node)el.appendChild(c)});
  return el;
}

  ));

  if(state.rachaYear==null)state.rachaYear=now.getFullYear();
  var vm=state.rachaMonth,vy=state.rachaYear;
  var today=todayStr();
  var todayMonth=now.getMonth(),todayYear=now.getFullYear();

    )

    h('div',{style:{display:'flex',alignItems:'center',gap:'4px'}},h('div',{style:{width:'12px',height:'12px',borderRadius:'50%',background:'var(--sage-light)'}}),h('span',{style:{fontSize:'11px',color:'var(--neutral-500)'}},'5-7 genial')),

    h('div',{style:{display:'flex',alignItems:'center',gap:'4px'}},h('div',{style:{width:'12px',height:'12px',borderRadius:'50%',background:'var(--peach-light)'}}),h('span',{style:{fontSize:'11px',color:'var(--neutral-500)'}},'0-2 a mejorar'))
  ));
  // Month card with chevron navigation
  var moName=new Date(vy,vm,1).toLocaleDateString('es-ES',{month:'long',year:'numeric'});
  moName=moName.charAt(0).toUpperCase()+moName.slice(1);
  var daysInMonth=new Date(vy,vm+1,0).getDate();
  var firstDow=new Date(vy,vm,1).getDay();
  var startOffset=(firstDow===0)?6:firstDow-1;
  var chevronStyle={width:'36px',height:'36px',borderRadius:'50%',border:'none',background:'var(--neutral-100)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'16px',color:'var(--neutral-800)',cursor:'pointer',flexShrink:'0'};
  var card=h('div',{className:'card',style:{padding:'16px'}});
  // Header row: ‹ Month Year ›
  card.appendChild(h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'12px'}},
    h('button',{style:chevronStyle,onClick:function(){state.rachaMonth--;if(state.rachaMonth<0){state.rachaMonth=11;state.rachaYear--}render()}},'‹'),
    h('div',{style:{fontFamily:'var(--font-display)',fontSize:'16px',color:'var(--neutral-800)',textAlign:'center'}},moName),
    h('button',{style:chevronStyle,onClick:function(){state.rachaMonth++;if(state.rachaMonth>11){state.rachaMonth=0;state.rachaYear++}render()}},'›')
  ));
  // Day headers
  var headerRow=h('div',{style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'4px',marginBottom:'6px'}});
  ['L','M','X','J','V','S','D'].forEach(function(dl){

  });
  card.appendChild(headerRow);

  for(var e=0;e<startOffset;e++){
    grid.appendChild(h('div',{style:{aspectRatio:'1'}}));
  }
  for(var d=1;d<=daysInMonth;d++){
    var ds=vy+'-'+String(vm+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var isFutureDay=ds>today;
    var bg='#F2EDE6';
    var color='var(--neutral-300)';
    if(isFutureMonth||isFutureDay){
      bg='#F2EDE6';color='var(--neutral-300)';
    }else{
      var checks=S.get('checks_'+ds,{});
      var sc=HABITS.reduce(function(s,hb){return s+(checks[hb.key]?1:0)},0);

    if(isToday){cellStyle.border='2px solid var(--neutral-800)'}
    grid.appendChild(h('div',{style:cellStyle},String(d)));
  }
  card.appendChild(grid);
  page.appendChild(card);
  page.appendChild(starOrnament());
  return page;
}

function openDrawer(){
  var dc=document.getElementById('drawer-content');dc.innerHTML='';
  var score=getScore();
  dc.appendChild(h('div',{style:{fontFamily:'var(--font-display)',fontSize:'20px',color:'var(--neutral-800)',marginBottom:'4px'}},'Registrar hábitos'));

  HABITS.forEach(function(hab){
    var checked=!!state.checks[hab.key];
    dc.appendChild(h('div',{className:'check-item'+(checked?' checked':''),onClick:function(){
      var wasChecked=!!state.checks[hab.key];
      state.checks[hab.key]=!state.checks[hab.key];

  });
  document.getElementById('drawer-overlay').classList.add('open');

function startShapeRain(){

    s.innerHTML=RAIN_SHAPES[Math.floor(Math.random()*RAIN_SHAPES.length)];

  }
}

var PAGE_TITLES={dashboard:null,menu:'Menú',entreno:'Entrenamiento',peso:'Peso',racha:'Racha',ejercicio_detalle:null};
function renderHeader(){
  var hdr=document.getElementById('app-header');hdr.innerHTML='';
  if(state.page==='ejercicio_detalle'){hdr.style.display='none';return}
  hdr.style.display='';
  if(state.page==='dashboard'){
    hdr.appendChild(h('h1',{},'LoveMe'));
    hdr.appendChild(h('div',{className:'header-sub'},'Agos · 1300 kcal · Meta 52 kg'));
  }else if(state.page==='racha'){
    hdr.style.display='none';return;
  }else{
    hdr.appendChild(h('h1',{},PAGE_TITLES[state.page]||''));
  }
  // Settings gear
  var gearBtn=h('button',{id:'settings-btn',style:{position:'absolute',right:'16px',top:'50%',transform:'translateY(-50%)',background:'none',border:'none',fontSize:'18px',color:'var(--neutral-400)',cursor:'pointer',padding:'6px'}},'⚙️');
  var menuDiv=h('div',{id:'settings-menu',className:'hidden',style:{position:'absolute',right:'16px',top:'100%',marginTop:'4px',background:'white',borderRadius:'var(--radius-xl)',boxShadow:'var(--shadow-lg)',padding:'6px',zIndex:'60',minWidth:'180px'}},
    h('button',{onClick:function(){exportData()},style:{display:'flex',alignItems:'center',gap:'8px',width:'100%',padding:'10px 12px',border:'none',background:'none',fontFamily:'var(--font-body)',fontSize:'14px',color:'var(--neutral-700)',cursor:'pointer',borderRadius:'var(--radius-md)',fontWeight:'500',textAlign:'left'}},'📤 Exportar backup'),
    h('button',{onClick:function(){importData()},style:{display:'flex',alignItems:'center',gap:'8px',width:'100%',padding:'10px 12px',border:'none',background:'none',fontFamily:'var(--font-body)',fontSize:'14px',color:'var(--neutral-700)',cursor:'pointer',borderRadius:'var(--radius-md)',fontWeight:'500',textAlign:'left'}},'📥 Restaurar backup')
  );
  gearBtn.addEventListener('click',function(e){e.stopPropagation();menuDiv.classList.toggle('hidden')});
  menuDiv.addEventListener('click',function(e){e.stopPropagation()});
  hdr.appendChild(gearBtn);hdr.appendChild(menuDiv);
}

function render(){checkDayReset();calcStreak();save();const c=document.getElementById('page-content');c.innerHTML='';
  var pages={dashboard:renderDashboard,peso:renderPeso,menu:renderMenu,entreno:renderEntrenamiento,ejercicio_detalle:renderExerciseDetail,racha:renderRacha};
  renderHeader();c.appendChild(pages[state.page]());renderNav();
}

function initOnboarding(){
  if(state.weights.length===0){
    document.getElementById('onboarding').classList.remove('hidden');
    document.getElementById('onboard-btn').addEventListener('click',function(){
      const w=parseFloat(document.getElementById('onboard-weight').value);
      if(!w||w<30||w>200)return;
      state.weights=[{date:todayStr(),weight:w}];save();
      document.getElementById('onboarding').classList.add('hidden');render();
    });
  }else{render()}
}
document.addEventListener('DOMContentLoaded',function(){
  initOnboarding();if(state.weights.length>0)render();
  document.addEventListener('click',function(){var m=document.getElementById('settings-menu');if(m)m.classList.add('hidden')});
});
</script>
</body>
</html>
